version: "3"

# ─────────────────────────────────────────────────────────────
#  NYC TAXI — Architecture Médaillon
#
#  BASE : docker-compose du prof (inchangée)
#  AJOUTS projet :
#    - volume ./pipeline sur spark-master + workers
#    - spark-worker-2
#    - mysql (couche Gold)
#    - api (Flask REST)
#    - streamlit (dashboard)
#
#  Interfaces :
#    HDFS UI        → http://localhost:9870
#    YARN UI        → http://localhost:8088
#    Spark Master   → http://localhost:8080
#    Spark App UI   → http://localhost:4040
#    Hive           → localhost:10000
#    MySQL Gold     → localhost:3306
#    API Flask      → http://localhost:5000
#    Dashboard      → http://localhost:8501
# ─────────────────────────────────────────────────────────────

services:

  # ════════════════════════════════════════════════════════════
  #  HADOOP — identique au prof
  # ════════════════════════════════════════════════════════════
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - 9870:9870
      - 9010:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./source:/source          # données sources locales montées ici
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    env_file:
      - ./hadoop.env

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9864:9864"
    env_file:
      - ./hadoop.env

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    ports:
      - "8088:8088"
    env_file:
      - ./hadoop.env

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env

  # ════════════════════════════════════════════════════════════
  #  SPARK — base prof + worker-2 + volume pipeline
  # ════════════════════════════════════════════════════════════
  spark-master:
    image: bde2020/spark-master:3.0.0-hadoop3.2
    container_name: spark-master
    depends_on:
      - namenode
      - datanode
    ports:
      - "8080:8080"     # Spark Master UI
      - "7077:7077"
      - "4040:4040"     # Spark App UI (cache/persist visible ici)
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./source:/source            # données sources
      - ./pipeline:/opt/pipeline    # feeder.py, processor.py, datamart.py

  spark-worker-1:
    image: bde2020/spark-worker:3.0.0-hadoop3.2
    container_name: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - "SPARK_MASTER=spark://spark-master:7077"
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./source:/source
      - ./pipeline:/opt/pipeline

  spark-worker-2:
    image: bde2020/spark-worker:3.0.0-hadoop3.2
    container_name: spark-worker-2
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    volumes:
      - ./source:/source
      - ./pipeline:/opt/pipeline

  # ════════════════════════════════════════════════════════════
  #  HIVE — identique au prof
  # ════════════════════════════════════════════════════════════
  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    depends_on:
      - namenode
      - datanode
    env_file:
      - ./hadoop-hive.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore/metastore"
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    env_file:
      - ./hadoop-hive.env
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: "namenode:9870 datanode:9864 hive-metastore-postgresql:5432"
    ports:
      - "9083:9083"

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    ports:
      - "5432:5432"

  presto-coordinator:
    image: shawnzhu/prestodb:0.181
    container_name: presto-coordinator
    ports:
      - "8089:8089"

  # ════════════════════════════════════════════════════════════
  #  AJOUTS PROJET : MySQL + API Flask + Streamlit
  # ════════════════════════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: mysql-gold
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - MYSQL_DATABASE=gold
      - MYSQL_USER=taxi_user
      - MYSQL_PASSWORD=taxi1234
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taxi-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MYSQL_HOST=mysql-gold
      - MYSQL_USER=taxi_user
      - MYSQL_PASSWORD=taxi1234
      - MYSQL_DATABASE=gold
    depends_on:
      - mysql

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: taxi-dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - MYSQL_HOST=mysql-gold
      - MYSQL_USER=taxi_user
      - MYSQL_PASSWORD=taxi1234
      - MYSQL_DATABASE=gold
    depends_on:
      - mysql

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  mysql_data: